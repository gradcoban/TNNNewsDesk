<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNN NewsDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ─── RESET & VARS ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0e0e10;
  --surf:    #17171a;
  --card:    #1e1e22;
  --border:  #2c2c32;
  --bh:      #3e3e48;
  --text:    #e8e8f0;
  --t2:      #9898a8;
  --t3:      #555560;
  --t4:      #2e2e38;
  --acc:     #E04E1B;
  --acc2:    #c04015;
  --adim:    rgba(224,78,27,.10);
  --aglow:   rgba(224,78,27,.22);
  --green:   #22c55e;
  --blue:    #3b82f6;
  --yellow:  #eab308;
  --red:     #ef4444;
  --purple:  #a855f7;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Sarabun', sans-serif;
  --r:  8px;
  --rl: 12px;
}
html, body { height: 100%; overflow: hidden; font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--acc); }
::-webkit-calendar-picker-indicator { filter: invert(.5); }

/* ─── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes spin     { to { transform:rotate(360deg); } }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
.fu  { animation: fadeUp .25s cubic-bezier(.22,.61,.36,1) forwards; }
.fi  { animation: fadeIn .2s ease forwards; }
.sp  { animation: spin .7s linear infinite; }
.pu  { animation: pulse 1.6s ease-in-out infinite; }

/* ─── LOGIN ───────────────────────────────────────────────── */
#login-screen {
  position:fixed; inset:0; z-index:99;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse 70% 60% at 60% 40%, rgba(224,78,27,.08), transparent 68%), var(--bg);
}
.lc {
  width:100%; max-width:340px;
  background:var(--surf); border:1px solid var(--border); border-radius:18px;
  padding:32px 28px; box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 24px 48px rgba(0,0,0,.5);
}
.logo-box {
  width:40px; height:40px; border-radius:10px; background:var(--acc);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-weight:700; font-size:9px; color:#fff; line-height:1.2; text-align:center;
  box-shadow:0 0 18px var(--aglow);
}

/* ─── APP SHELL ───────────────────────────────────────────── */
#app { display:none; height:100%; flex-direction:row; }
#app.on { display:flex; }

/* ─── SIDEBAR ─────────────────────────────────────────────── */
#sidebar {
  width:260px; flex-shrink:0;
  background:var(--surf); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sb-logo {
  padding:13px 15px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:9px;
}
.sb-logo-icon {
  width:28px; height:28px; border-radius:7px; background:var(--acc);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-weight:700; font-size:7px; color:#fff; line-height:1.2; text-align:center;
  box-shadow:0 0 10px var(--aglow); flex-shrink:0;
}
.sb-nav { flex:1; overflow-y:auto; padding:7px 7px 4px; }
.nav-grp { font-size:9px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; padding:9px 8px 4px; }
.nb {
  display:flex; align-items:center; gap:9px; width:100%;
  padding:8px 10px; border-radius:7px;
  font-family:var(--sans); font-size:13px; font-weight:500;
  color:var(--t2); background:transparent; border:1px solid transparent;
  cursor:pointer; text-align:left; transition:all .15s; margin-bottom:1px;
}
.nb i { font-size:12px; width:14px; text-align:center; color:var(--t3); flex-shrink:0; transition:color .15s; }
.nb:hover { background:var(--card); color:var(--text); }
.nb:hover i { color:var(--t2); }
.nb.on { background:var(--adim); color:var(--acc); border-color:var(--aglow); }
.nb.on i { color:var(--acc); }
.nb-badge { margin-left:auto; background:var(--red); color:#fff; font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px; font-family:var(--mono); }
.sb-user {
  padding:9px 10px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.av {
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:#fff; flex-shrink:0;
}

/* ─── TOPBAR ──────────────────────────────────────────────── */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#topbar {
  height:48px; flex-shrink:0;
  background:var(--surf); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 20px;
}
#pg-title { font-size:13px; font-weight:700; color:var(--text); }
.pill { font-family:var(--mono); font-size:10.5px; color:var(--t2); background:var(--card); border:1px solid var(--border); border-radius:6px; padding:3px 9px; }
#clk { color:var(--acc); }
#pg-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; }

/* ─── FORM ELEMENTS ───────────────────────────────────────── */
.inp {
  width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
  border-radius:var(--r); padding:8px 11px; font-size:13px; font-family:var(--sans);
  outline:none; transition:border-color .15s;
}
.inp:focus { border-color:var(--acc); }
.inp::placeholder { color:var(--t4); }
select.inp { cursor:pointer; appearance:none; }
textarea.inp { resize:vertical; }
.lbl { display:block; font-size:10.5px; font-weight:600; color:var(--t3); margin-bottom:4px; letter-spacing:.02em; }

/* ─── BUTTONS ─────────────────────────────────────────────── */
.btn { display:inline-flex; align-items:center; gap:6px; border:none; border-radius:var(--r); padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--sans); transition:all .15s; white-space:nowrap; }
.bp  { background:var(--acc); color:#fff; }
.bp:hover { background:var(--acc2); }
.bp:disabled { opacity:.45; cursor:not-allowed; }
.bg  { background:transparent; color:var(--t2); border:1px solid var(--border); }
.bg:hover { color:var(--text); border-color:var(--bh); }
.bgreen { background:rgba(34,197,94,.1); color:#4ade80; border:1px solid rgba(34,197,94,.22); }
.bgreen:hover { background:rgba(34,197,94,.18); }
.bred { background:rgba(239,68,68,.1); color:#f87171; border:1px solid rgba(239,68,68,.22); }
.bred:hover { background:rgba(239,68,68,.18); }
.bsm { padding:5px 10px; font-size:11.5px; }
.bic { padding:6px; background:transparent; border:1px solid var(--border); color:var(--t3); border-radius:6px; cursor:pointer; font-size:11px; transition:all .15s; }
.bic:hover { color:var(--text); border-color:var(--bh); background:var(--card); }

/* ─── CARDS & SURFACES ────────────────────────────────────── */
.card  { background:var(--card); border:1px solid var(--border); border-radius:var(--rl); }
.cardsm { background:var(--card); border:1px solid var(--border); border-radius:var(--r); }
.stat { background:var(--card); border:1px solid var(--border); border-radius:var(--rl); padding:13px 15px; }

/* ─── BADGES ──────────────────────────────────────────────── */
.badge { display:inline-flex; align-items:center; font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; border:1px solid; white-space:nowrap; }
.b-pend { background:rgba(239,68,68,.07); color:#f87171; border-color:rgba(239,68,68,.2); }
.b-asgn { background:rgba(59,130,246,.07); color:#60a5fa; border-color:rgba(59,130,246,.2); }
.b-done { background:rgba(34,197,94,.07); color:#4ade80; border-color:rgba(34,197,94,.2); }
.b-rate   { background:rgba(234,179,8,.07);  color:#facc15;  border-color:rgba(234,179,8,.2);  }
.b-travel { background:rgba(167,139,250,.07); color:#a78bfa; border-color:rgba(167,139,250,.2); }
.b-avail { background:rgba(34,197,94,.07); color:#4ade80; border-color:rgba(34,197,94,.2); }
.b-inuse { background:rgba(59,130,246,.07); color:#60a5fa; border-color:rgba(59,130,246,.2); }
.b-maint { background:rgba(239,68,68,.07); color:#fca5a5; border-color:rgba(239,68,68,.2); }

/* ─── TABLE ───────────────────────────────────────────────── */
.tbl { width:100%; border-collapse:collapse; }
.tbl th { padding:8px 13px; font-size:10px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
.tbl td { padding:9px 13px; font-size:12.5px; border-bottom:1px solid rgba(255,255,255,.03); vertical-align:middle; }
.tbl tbody tr:last-child td { border-bottom:none; }
.tbl tbody tr:hover td { background:rgba(255,255,255,.01); }

/* ─── MODAL ───────────────────────────────────────────────── */
.modal-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:80; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
.modal-ov.on { display:flex; }
.modal-box { background:var(--card); border:1px solid var(--border); border-radius:16px; width:100%; max-width:480px; margin:16px; box-shadow:0 24px 48px rgba(0,0,0,.5); }
.mh { padding:18px 20px 0; display:flex; align-items:center; justify-content:space-between; }
.mb { padding:16px 20px; }
.mf { padding:0 20px 18px; display:flex; justify-content:flex-end; gap:7px; border-top:1px solid var(--border); padding-top:13px; }
.mcl { background:none; border:none; color:var(--t3); cursor:pointer; font-size:16px; padding:3px 6px; border-radius:5px; transition:color .15s; }
.mcl:hover { color:var(--text); }

/* ─── CRITERIA RATING ─────────────────────────────────────── */
.cr-btn {
  flex:1; padding:7px 4px; border-radius:7px; border:1px solid var(--border);
  background:transparent; color:var(--t3); font-size:11px; font-weight:600;
  cursor:pointer; font-family:var(--sans); transition:all .13s; text-align:center;
}
.cr-btn:hover { border-color:var(--bh); color:var(--text); }
.cr-btn.good  { background:rgba(34,197,94,.12);  border-color:rgba(34,197,94,.35);  color:#4ade80; }
.cr-btn.ok    { background:rgba(234,179,8,.10);  border-color:rgba(234,179,8,.35);  color:#facc15; }
.cr-btn.bad   { background:rgba(239,68,68,.10);  border-color:rgba(239,68,68,.35);  color:#f87171; }
/* keep star CSS for backward compat on display */
.star { background:none; border:none; cursor:pointer; font-size:18px; color:var(--t4); transition:color .12s; padding:1px 2px; }
.star.lit { color:#f5c518; }

/* ─── SCROLL PAGE ─────────────────────────────────────────── */
.pg { flex:1; overflow-y:auto; padding:22px; }

/* ─── GLOBAL CALENDAR ─────────────────────────────────────── */
.cal-wrap {
  border-bottom: 1px solid var(--border);
  padding: 12px 12px 10px;
  flex-shrink: 0;
  background: var(--bg);
  /* Lock height so calendar never shifts layout */
  height: 262px;
  overflow: hidden;
}
.cal-mode-bar {
  display: flex; gap: 3px; margin-bottom: 10px;
}
.cal-mode-btn {
  flex: 1; padding: 5px 0; font-size: 10px; font-weight: 500;
  border: 1px solid var(--border); background: transparent;
  color: var(--t3); border-radius: 6px; cursor: pointer;
  font-family: var(--sans); transition: all .13s;
}
.cal-mode-btn:hover { color: var(--text); border-color: var(--bh); }
.cal-mode-btn.on    { background: var(--acc); color: #fff; border-color: var(--acc); }
.cal-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.cal-nav {
  background: var(--card); border: 1px solid var(--border);
  color: var(--t2); cursor: pointer; width: 24px; height: 24px;
  border-radius: 6px; font-size: 14px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all .13s;
}
.cal-nav:hover { background: var(--border); color: var(--text); }
.cal-title {
  font-size: 12px; font-weight: 700; color: var(--text);
  cursor: pointer; padding: 2px 6px; border-radius: 5px;
  transition: all .13s;
}
.cal-title:hover { color: var(--acc); background: var(--adim); }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  grid-auto-rows: 26px;   /* each row fixed 26px — never grows */
  gap: 2px;
  /* Fix to exactly 6 data rows + 1 header row */
  height: 188px;
  overflow: hidden;
}
.cal-hd {
  text-align: center; font-size: 9px; color: var(--t3);
  padding: 2px 0 4px; font-weight: 600;
}
.cal-day {
  text-align: center; font-size: 11px; padding: 4px 2px;
  border-radius: 6px; cursor: pointer; transition: all .12s;
  color: var(--t2); position: relative; line-height: 1.4;
  min-height: 26px; display: flex; align-items: center; justify-content: center;
}
.cal-day:hover  { background: var(--border); color: var(--text); }
.cal-day.today  { color: var(--acc); font-weight: 700; }
.cal-day.today::before {
  content: ''; position: absolute; inset: 0;
  border: 1.5px solid var(--aglow); border-radius: 6px;
}
.cal-day.sel    { background: var(--acc) !important; color: #fff !important; font-weight: 700; }
.cal-day.in-range  { background: var(--adim); color: var(--acc); }
.cal-day.range-edge { background: var(--acc) !important; color: #fff !important; font-weight: 700; }
.cal-day.other  { color: var(--t4); font-size: 10px; }
.cal-day.has-data::after {
  content: ''; position: absolute; bottom: 2px; left: 50%;
  transform: translateX(-50%); width: 4px; height: 4px;
  background: var(--green); border-radius: 50%;
}
.gd-label {
  margin-top: 8px; padding: 5px 8px; border-radius: 7px;
  background: var(--card); border: 1px solid var(--border);
  font-size: 10px; color: var(--t2); text-align: center;
  min-height: 24px; line-height: 1.5;
}
.gd-label span { color: var(--acc); font-weight: 700; }

/* ─── GRID HELPERS ────────────────────────────────────────── */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
.g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
.g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; }

/* ─── PROGRESS BAR ────────────────────────────────────────── */
.prog { height:3px; background:var(--border); border-radius:3px; overflow:hidden; }
.pf   { height:100%; background:var(--acc); border-radius:3px; transition:width .5s; }

/* ─── TIMELINE ────────────────────────────────────────────── */
.timeline { position:relative; padding-left:32px; }
.timeline::before { content:''; position:absolute; top:8px; bottom:8px; left:16px; width:1px; background:linear-gradient(to bottom, var(--border), transparent); }
.tli { position:relative; margin-bottom:13px; }
.tld { position:absolute; left:-22px; top:14px; width:9px; height:9px; border-radius:50%; border:2px solid var(--bg); }

/* ─── SEGMENT ─────────────────────────────────────────────── */
.seg { display:inline-flex; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:3px; gap:2px; }
.sb  { padding:5px 12px; font-size:11.5px; font-weight:500; border-radius:5px; border:none; cursor:pointer; font-family:var(--sans); transition:all .15s; color:var(--t3); background:transparent; }
.sb.on { background:var(--acc); color:#fff; }
.sb:not(.on):hover { color:var(--text); background:rgba(255,255,255,.04); }

/* ─── TOAST ───────────────────────────────────────────────── */
#toasts { position:fixed; bottom:18px; right:18px; z-index:999; display:flex; flex-direction:column; gap:7px; pointer-events:none; }
.toast { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--green); border-radius:9px; padding:9px 13px; font-size:12.5px; color:var(--text); max-width:290px; box-shadow:0 8px 24px rgba(0,0,0,.4); animation:fadeUp .22s ease; }
.toast.err { border-left-color:var(--red); }
.toast.warn { border-left-color:var(--yellow); }

/* ─── CREW LAYOUT ─────────────────────────────────────────── */
.crew-wrap { display:flex; flex:1; overflow:hidden; }
.crew-sb { width:250px; flex-shrink:0; border-right:1px solid var(--border); background:var(--surf); display:flex; flex-direction:column; overflow:hidden; }
.crew-main { flex:1; overflow-y:auto; padding:20px; }

/* ─── SECTION LABEL ───────────────────────────────────────── */
.slbl { font-size:9.5px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:7px; }

/* ─── STEP NUMBER ─────────────────────────────────────────── */
.step-num { width:22px; height:22px; border-radius:6px; background:var(--adim); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--acc); font-family:var(--mono); flex-shrink:0; }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-screen">
  <div class="lc fu">
    <div style="text-align:center;margin-bottom:22px;">
      <div class="logo-box" style="margin:0 auto 11px;">TNN<br>16</div>
      <div style="font-size:18px;font-weight:800;color:var(--text);">TNN NewsDesk</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px;">ระบบบริหารงานข่าว — TNN Channel 16</div>
    </div>
    <div id="lerr" style="display:none;margin-bottom:11px;padding:8px 11px;border-radius:7px;font-size:12px;text-align:center;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#f87171;"></div>
    <div style="display:flex;flex-direction:column;gap:9px;">
      <div><label class="lbl">Username</label><input id="lu" class="inp" type="text" placeholder="กรอก username" autocomplete="username"></div>
      <div>
        <label class="lbl">Password</label>
        <div style="position:relative;">
          <input id="lp" class="inp" type="password" placeholder="กรอก password" style="padding-right:36px;" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
          <button onclick="togglePw()" type="button" style="position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;"><i id="pw-i" class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <button id="lbtn" onclick="login()" class="btn bp" style="width:100%;justify-content:center;margin-top:3px;padding:9px;">เข้าสู่ระบบ</button>
    </div>
    <div style="margin-top:16px;padding:11px;border-radius:8px;background:var(--bg);border:1px solid var(--border);">
      <div style="font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">บัญชีทดสอบ</div>
      <div id="l-hints"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">TNN<br>16</div>
      <div>
        <div style="font-size:12.5px;font-weight:700;color:var(--text);">NewsDesk</div>
        <div style="font-size:9px;color:var(--t3);">TNN Channel 16</div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <!-- Global Calendar -->
    <div class="cal-wrap" id="cal-wrap">
      <div class="cal-mode-bar">
        <button class="cal-mode-btn on" onclick="calSetMode('day',this)">วัน</button>
        <button class="cal-mode-btn"    onclick="calSetMode('month',this)">เดือน</button>
        <button class="cal-mode-btn"    onclick="calSetMode('year',this)">ปี</button>
        <button class="cal-mode-btn"    onclick="calSetMode('range',this)">ช่วง</button>
        <button class="cal-mode-btn"    onclick="calSetMode('all',this)">ทั้งหมด</button>
      </div>
      <div class="cal-top">
        <button class="cal-nav" onclick="calPrev()">‹</button>
        <span class="cal-title" id="cal-title" onclick="calGoToday()"></span>
        <button class="cal-nav" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="gd-label" id="gd-label"></div>
    </div>

    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user">
      <div id="sb-av" class="av" style="background:#1d4ed8;"></div>
      <div style="flex:1;min-width:0;">
        <div id="sb-name" style="font-size:11.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>

  };

/* ══════════════════════════════════════════════════════════
   GLOBAL CALENDAR ENGINE
══════════════════════════════════════════════════════════ */
const CAL = {
  year:  new Date().getFullYear(),
  month: new Date().getMonth(),  // 0-based
  rangeStep: 0,  // 0=pick from, 1=pick to
};
const MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const DAYS_TH   = ['อา','จ','อ','พ','พฤ','ศ','ส'];

// Init with today
function calInit() {
  const n = new Date();
  CAL.year = n.getFullYear(); CAL.month = n.getMonth();
  GD.mode = 'day'; GD.date = today();
  GD.month = today().slice(0,7); GD.year = String(n.getFullYear());
  GD.rangeFrom = ''; GD.rangeTo = '';
  calRender(); gdUpdateLabel();
}

function calSetMode(mode, btn) {
  GD.mode = mode;
  document.querySelectorAll('.cal-mode-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // hide/show nav for 'all' and 'year' modes
  const calGrid = document.getElementById('cal-grid');
  const calTop  = document.querySelector('.cal-top');
  if (mode === 'all') {
    if (calGrid) calGrid.innerHTML = '';
    if (calTop)  calTop.style.display = 'none';
    gdUpdateLabel(); gdApply(); return;
  }
  if (calTop) calTop.style.display = '';
  if (mode === 'year') { calRenderYearPicker(); gdUpdateLabel(); gdApply(); return; }
  if (mode === 'month') { calRenderMonthPicker(); gdUpdateLabel(); gdApply(); return; }
  if (mode === 'range') { CAL.rangeStep = 0; GD.rangeFrom=''; GD.rangeTo=''; }
  calRender(); gdUpdateLabel();
}

function calRender() {
  const y = CAL.year, m = CAL.month;
  const titleEl = document.getElementById('cal-title');
  if (titleEl) titleEl.textContent = MONTHS_TH[m] + ' ' + (y+543);
  const firstDay = new Date(y,m,1).getDay();
  const lastDate = new Date(y,m+1,0).getDate();
  const prevLast = new Date(y,m,0).getDate();
  const td = today();
  // collect dates with data — support multi-day (capped 365 days)
  const dateCounts = {};
  ASSIGN.forEach(a => {
    if (!a.date) return;
    const end = (a.date2 && a.date2 > a.date) ? a.date2 : a.date;
    let cur = a.date;
    let safety = 0;
    while (cur <= end && safety < 365) {
      safety++;
      dateCounts[cur] = (dateCounts[cur]||0)+1;
      if (cur === end) break;
      const d = new Date(cur+'T00:00:00'); d.setDate(d.getDate()+1);
      cur = d.toISOString().split('T')[0];
    }
  });
  const cells = [];
  // header
  DAYS_TH.forEach(d => cells.push(`<div class="cal-hd">${d}</div>`));
  const total = 42;  // always 6 rows — keeps calendar height constant
  for (let i=0; i<total; i++) {
    let day, dateStr, cls='cal-day';
    if (i < firstDay) {
      day = prevLast-firstDay+1+i;
      dateStr = fmtDate(y, m-1, day); cls += ' other';
    } else if (i < firstDay+lastDate) {
      day = i-firstDay+1;
      dateStr = fmtDate(y, m, day);
      if (dateStr===td) cls += ' today';
      if (dateCounts[dateStr]) cls += ' has-data';
      if (GD.mode==='day' && dateStr===GD.date) cls += ' sel';
      if (GD.mode==='range') {
        if (dateStr===GD.rangeFrom||dateStr===GD.rangeTo) cls += ' range-edge sel';
        else if (GD.rangeFrom&&GD.rangeTo&&dateStr>GD.rangeFrom&&dateStr<GD.rangeTo) cls += ' in-range';
      }
    } else {
      day = i-firstDay-lastDate+1;
      dateStr = fmtDate(y, m+1, day); cls += ' other';
    }
    cells.push(`<div class="${cls}" onclick="calClickDay('${dateStr}')">${day}</div>`);
  }
  const el = document.getElementById('cal-grid');
  if (el) el.innerHTML = cells.join('');
}

function calRenderMonthPicker() {
  const titleEl = document.getElementById('cal-title');
  if (titleEl) titleEl.textContent = String(CAL.year+543);
  const el = document.getElementById('cal-grid');
  if (!el) return;
  const cur = GD.month;
  /* Reset to fixed columns and fill all 42 cells to keep height constant */
  el.style.gridTemplateColumns = '';
  el.style.gridTemplateRows = '';
  /* 12 months + 30 empty spacers = 42 cells = 6 rows × 7 cols */
  const cells = MONTHS_TH.map((m,i) => {
    const val = fmtDate(CAL.year, i, 1).slice(0,7);
    const hasDat = ASSIGN.some(a=>a.date&&a.date.slice(0,7)===val);
    const isSel  = val === cur;
    return `<div class="cal-day${isSel?' sel':''}${hasDat?' has-data':''}" style="font-size:10px;" onclick="calClickMonth('${val}')">${m}</div>`;
  });
  /* pad to 42 */
  while (cells.length < 42) cells.push('<div class="cal-day other" style="cursor:default;"></div>');
  /* header row: 7 empty */
  el.innerHTML = '<div class="cal-hd"></div>'.repeat(7) + cells.join('');
}

function calRenderYearPicker() {
  const titleEl = document.getElementById('cal-title');
  if (titleEl) titleEl.textContent = `${CAL.year-3+543}–${CAL.year+2+543}`;
  const el = document.getElementById('cal-grid');
  if (!el) return;
  /* Reset to fixed 7-column grid, keep 42 total cells */
  el.style.gridTemplateColumns = '';
  el.style.gridTemplateRows = '';
  const yrs = [CAL.year-3,CAL.year-2,CAL.year-1,CAL.year,CAL.year+1,CAL.year+2];
  const cells = yrs.map(y => {
    const hasDat = ASSIGN.some(a=>a.date&&a.date.slice(0,4)===String(y));
    const isSel  = String(y) === GD.year;
    return `<div class="cal-day${isSel?' sel':''}${hasDat?' has-data':''}" style="font-size:10px;" onclick="calClickYear('${y}')">${y+543}</div>`;
  });
  /* pad to 42 */
  while (cells.length < 42) cells.push('<div class="cal-day other" style="cursor:default;"></div>');
  el.innerHTML = '<div class="cal-hd"></div>'.repeat(7) + cells.join('');
}

function calClickDay(dateStr) {
  if (GD.mode === 'range') {
    if (CAL.rangeStep === 0) {
      GD.rangeFrom = dateStr; GD.rangeTo = '';
      CAL.rangeStep = 1;
    } else {
      if (dateStr < GD.rangeFrom) { GD.rangeTo=GD.rangeFrom; GD.rangeFrom=dateStr; }
      else GD.rangeTo = dateStr;
      CAL.rangeStep = 0;
    }
    calRender(); gdUpdateLabel(); gdApply(); return;
  }
  GD.date = dateStr;
  // navigate calendar if clicking other-month day
  const [y,m] = dateStr.split('-').map(Number);
  CAL.year = y; CAL.month = m-1;
  calRender(); gdUpdateLabel(); gdApply();
}
function calClickMonth(ym) {
  GD.month = ym; const [y,m] = ym.split('-').map(Number);
  CAL.year = y; CAL.month = m-1;
  calRenderMonthPicker(); gdUpdateLabel(); gdApply();
}
function calClickYear(y) {
  GD.year = String(y); CAL.year = y;
  calRenderYearPicker(); gdUpdateLabel(); gdApply();
}

function calPrev() {
  if (GD.mode==='month') { CAL.year--; calRenderMonthPicker(); }
  else if (GD.mode==='year') { CAL.year-=6; calRenderYearPicker(); }
  else { CAL.month--; if(CAL.month<0){CAL.month=11;CAL.year--;} calRender(); }
}
function calNext() {
  if (GD.mode==='month') { CAL.year++; calRenderMonthPicker(); }
  else if (GD.mode==='year') { CAL.year+=6; calRenderYearPicker(); }
  else { CAL.month++; if(CAL.month>11){CAL.month=0;CAL.year++;} calRender(); }
}
function calGoToday() {
  const n=new Date(); CAL.year=n.getFullYear(); CAL.month=n.getMonth();
  GD.date=today(); GD.month=today().slice(0,7); GD.year=String(n.getFullYear());
  calRender(); gdUpdateLabel(); gdApply();
}

function fmtDate(y,m,d) {
  const dt = new Date(y,m,d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function gdUpdateLabel() {
  const el = document.getElementById('gd-label'); if (!el) return;
  let txt = '';
  if (GD.mode==='all') txt = 'ดูทั้งหมด';
  else if (GD.mode==='day')   txt = 'วันที่ <span>' + GD.date + '</span>';
  else if (GD.mode==='month') txt = 'เดือน <span>' + GD.month + '</span>';
  else if (GD.mode==='year')  txt = 'ปี <span>' + (parseInt(GD.year)+543) + '</span>';
  else if (GD.mode==='range') {
    if (!GD.rangeFrom) txt = 'คลิกวันเริ่มต้น';
    else if (!GD.rangeTo) txt = '<span>' + GD.rangeFrom + '</span> → คลิกวันสิ้นสุด';
    else txt = '<span>' + GD.rangeFrom + '</span> ถึง <span>' + GD.rangeTo + '</span>';
  }
  el.innerHTML = txt;
}

// Apply GD to current page — refresh all pages that depend on date filter
function gdApply() {
  const cur = document.getElementById('pg-title')?.textContent;
  if      (cur===PTITLE.dash)   dRender();
  else if (cur===PTITLE.rating) { if (typeof rtRenderScore==='function') rtRenderScore(); }
  else if (cur===PTITLE.drive)  { if (typeof driveRender==='function')   driveRender(); }
  // update badge only (no full buildNav)
  const pend = ASSIGN.filter(a=>a.status==='pending').length;
  const b = document.querySelector('.nb-badge');
  if (b) b.textContent = pend;
}

// Filter ASSIGN by global GD
function assignCoversDate(a, d) {
  // หมายมีวันเดียว หรือ multi-day (date→date2)
  if (a.date2 && a.date2 > a.date) return d >= a.date && d <= a.date2;
  return a.date === d;
}
function assignInMonth(a, ym) {
  if (a.date2 && a.date2 > a.date) return a.date.slice(0,7)<=ym && a.date2.slice(0,7)>=ym;
  return a.date.slice(0,7) === ym;
}
function assignInYear(a, y) {
  if (a.date2 && a.date2 > a.date) return a.date.slice(0,4)<=y && a.date2.slice(0,4)>=y;
  return a.date.slice(0,4) === y;
}
function gdFilter(list) {
  if (GD.mode==='all') return list;
  if (GD.mode==='day')   return list.filter(a=>assignCoversDate(a,GD.date));
  if (GD.mode==='month') return list.filter(a=>assignInMonth(a,GD.month));
  if (GD.mode==='year')  return list.filter(a=>assignInYear(a,GD.year));
  if (GD.mode==='range'&&GD.rangeFrom&&GD.rangeTo)
    return list.filter(a=>{
      const s=a.date, e=a.date2||a.date;
      return s<=GD.rangeTo && e>=GD.rangeFrom;
    });
  return list;
}

  el.className = 'toast' + (type==='err'?' err':type==='warn'?' warn':'');
  el.innerHTML = `<i class="fa-solid ${icon}" style="margin-right:6px;"></i>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function dRender() {
  const sf  = document.getElementById('d-sf')?.value || '';
  let list = gdFilter([...ASSIGN]);
  if (sf) list = list.filter(a => a.status === sf);
  list.sort((a,b) => (a.date+a.ts).localeCompare(b.date+b.ts));
  // update pill
  const pill = document.getElementById('d-gd-pill');
  if (pill) {
    const MODE_LBL = {day:'วันที่ '+GD.date, month:'เดือน '+GD.month, year:'ปี '+(parseInt(GD.year)+543), all:'ทั้งหมด', range: GD.rangeFrom&&GD.rangeTo?GD.rangeFrom+' → '+GD.rangeTo:'เลือกช่วงจากปฏิทิน'};
    pill.textContent = MODE_LBL[GD.mode]||'';

  const el = document.getElementById('d-cards');
  if (!el) return;
  if (!list.length) {
    el.innerHTML = `<div style="text-align:center;padding:50px 20px;color:var(--t3);"><i class="fa-regular fa-calendar-xmark" style="font-size:30px;opacity:.4;display:block;margin-bottom:9px;"></i>ไม่มีหมายในช่วงเวลานี้</div>`;
    return;

}

function tlCard(a) {
  const s = sm(a.status);
  // permissions
  const canRate   = a.status==='done' && (CU.role==='admin' || (CU.role==='editor' && a.issuer===CU.name));
  const isMyJob   = ['assigned','travelling'].includes(a.status) && (
    (CU.role==='editor'   && a.issuer===CU.name) ||
    (CU.role==='admin') ||
    (CU.role==='cameraman' && (a.cams||[]).some(c=>c.name===CU.name))
  );
  const canFinish   = isMyJob;
  const canTravel   = a.status==='assigned' && CU.role==='cameraman' && (a.cams||[]).some(c=>c.name===CU.name);
  const canEdit   = ['pending','assigned'].includes(a.status) &&
    (CU.role==='admin' || (CU.role==='editor' && a.issuer===CU.name));
  // cam display (no rating stars, no comment on dashboard)
  const camBits = (a.cams||[]).length ? (a.cams||[]).map(c =>
    `<span><i class="fa-solid fa-camera" style="color:var(--t3);margin-right:4px;"></i>${c.name}${c.drive?'<span style="color:#4ade80;font-size:9.5px;margin-left:3px;font-family:var(--mono);">+150฿/วัน</span>':""}</span>`
  ).join('') : `<span style="color:var(--t3);font-style:italic;">รอจัดช่างภาพ</span>`;
  // map link
  const mapBtn = a.loc ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.loc)}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#60a5fa;text-decoration:none;border:1px solid rgba(59,130,246,.18);padding:2px 7px;border-radius:5px;background:rgba(59,130,246,.05);">
    <i class="fa-solid fa-map-location-dot" style="font-size:9px;"></i>แผนที่</a>` : '';
  return `
  <div class="tli">
    <div class="tld" style="background:${s.dot};${a.status==='assigned'?'box-shadow:0 0 7px '+s.dot+'55;':''}"></div>
    <div class="card" style="padding:13px 15px;transition:border-color .15s;" onmouseover="this.style.borderColor='var(--bh)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:9px;margin-bottom:8px;">
        <div style="flex:1;min-width:0;">
          <div style="font-family:var(--mono);font-size:8.5px;color:var(--t3);margin-bottom:2px;">${a.id}</div>
          <div style="font-size:13.5px;font-weight:700;color:var(--text);line-height:1.35;">${a.title}</div>
        </div>
        <span class="badge ${s.cls}" style="flex-shrink:0;">${s.lb}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:10.5px;color:var(--t2);margin-bottom:8px;align-items:center;">
        <span><i class="fa-solid fa-location-dot" style="color:var(--acc);margin-right:4px;"></i>${a.loc}</span>
        <span><i class="fa-regular fa-clock" style="margin-right:3px;opacity:.5;"></i>${a.date2&&a.date2>a.date?a.date+'→'+a.date2:a.date} ${a.ts}${a.te?'–'+a.te:''}</span>
        <span style="background:var(--bg);padding:1px 6px;border-radius:4px;border:1px solid var(--border);font-size:9.5px;">${a.cat||''}</span>
        ${mapBtn}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:9px;font-size:11.5px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;">
        ${a.reporter?`<span><i class="fa-solid fa-microphone-lines" style="color:var(--t3);margin-right:4px;"></i>${a.reporter}</span>`:''}
        ${camBits}
        ${a.vhc?`<span><i class="fa-solid fa-car" style="color:var(--t3);margin-right:4px;"></i>${a.vhc}</span>`:''}
      </div>
      ${a.equip_rem?`<div style="margin-top:6px;font-size:10.5px;padding:5px 9px;border-radius:6px;background:var(--adim);border:1px solid var(--aglow);color:var(--acc);"><i class="fa-solid fa-box" style="margin-right:5px;opacity:.7;"></i>${a.equip_rem}</div>`:''}
      <div style="margin-top:9px;display:flex;justify-content:flex-end;gap:6px;">
        ${canEdit?`<button onclick="editAssign('${a.id}')" class="btn bg bsm"><i class="fa-solid fa-pen"></i> แก้ไข</button>`:``}
        ${canTravel?`<button onclick="setTravelling('${a.id}')" class="btn bsm" style="background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.22);"><i class="fa-solid fa-car-side"></i> กำลังเดินทาง</button>`:``}
        ${canRate?`<button onclick="openRating('${a.id}')" class="btn bp bsm"><i class="fa-solid fa-star"></i> ประเมินผล</button>`:``}
        ${canFinish?`<button onclick="finishJob('${a.id}')" class="btn bgreen bsm"><i class="fa-solid fa-flag-checkered"></i> จบงาน</button>`:``}
      </div>
    </div>
  </div>`;
}

function setTravelling(id) {
  const i = ASSIGN.findIndex(a=>a.id===id); if (i<0) return;
  ASSIGN[i].status = 'travelling';
  saveAS(); dRender(); updateNotifBadge();
  toast('อัปเดตสถานะ: กำลังเดินทาง 🚗');
}
function finishJob(id) {
  const i = ASSIGN.findIndex(x => x.id===id); if (i<0) return;
  if (!['assigned','travelling'].includes(ASSIGN[i].status)) return;
  const a = ASSIGN[i];   // declare once
  ASSIGN[i].status = 'done';
  saveAS();
  // คืนอุปกรณ์และรถกลับ available
  (a.cams||[]).forEach(c => {
    (c.equipList||[]).forEach(code => {
      const ei = EQUIP.findIndex(e=>e.c===code);
      if (ei>=0 && EQUIP[ei].s==='in_use') EQUIP[ei].s='available';
    });
  });
  if (a.vhc) {
    const vi = EQUIP.findIndex(e=>e.n===a.vhc||e.c===a.vhc);
    if (vi>=0 && EQUIP[vi].s==='in_use') EQUIP[vi].s='available';
  }
  saveEQ();
  // ถ้าผู้กดคือผู้ออกหมาย หรือ admin → เปิด rating modal ทันที
  const isIssuer = CU.role==='admin' || (CU.role==='editor' && a.issuer===CU.name);
  if (isIssuer) {
    dRender();
    toast('บันทึกจบงานแล้ว — กรุณาประเมินผลงานช่างภาพ');
    setTimeout(() => openRating(id), 300);
  } else {
    toast('บันทึกจบงานแล้ว — รอการประเมินจากผู้ออกหมาย');
    dRender();
  }
}

function mpPrev() {
  clearTimeout(_mpTimer);
  const loc = document.getElementById('f-loc')?.value?.trim();
  const fr = document.getElementById('mp-fr'), ph = document.getElementById('mp-ph');
  if (loc && loc.length > 2) {
    _mpTimer = setTimeout(() => {
      fr.src = `https://maps.google.com/maps?q=${encodeURIComponent(loc)}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
      fr.style.opacity = '1'; if (ph) ph.style.opacity = '0';
    }, 900);
  } else {
    fr.style.opacity = '0'; if (ph) ph.style.opacity = '1'; fr.src = '';
  }
}
function addTag(t) {
  const el = document.getElementById('f-eq');
  if (el) el.value = el.value ? (el.value.includes(t) ? el.value : el.value+', '+t) : t;
}
function catChange() {
  const v = document.getElementById('f-cat')?.value;

  goPage('create');

function saveEditAssign(id) {
  const title = document.getElementById('f-title')?.value?.trim();
  const loc   = document.getElementById('f-loc')?.value?.trim();
  const catSel= document.getElementById('f-cat')?.value;
  const cat   = catSel==='ระบุ' ? (document.getElementById('f-cat-custom')?.value?.trim()||'ระบุ') : catSel;
  const ts    = document.getElementById('f-ts')?.value;
  if (!title||!cat||!loc||!ts) { toast('กรุณากรอกข้อมูลที่จำเป็น','err'); return; }
  const i = ASSIGN.findIndex(a=>a.id===id); if (i<0) return;
  Object.assign(ASSIGN[i], {
    title, cat, loc, ts,
    date: document.getElementById('f-date')?.value||ASSIGN[i].date,
    date2: document.getElementById('f-date2')?.value||'',
    te: document.getElementById('f-te')?.value||'',
    reporter: document.getElementById('f-rep')?.value||'',
    equip_rem: document.getElementById('f-eq')?.value||'',
    detail: document.getElementById('f-detail')?.value||'',
  });
  saveAS();
  toast('บันทึกการแก้ไขหมาย '+id+' แล้ว');
  goPage('dash');
}

function submitCreate(rid) {
  const title = document.getElementById('f-title')?.value?.trim();
  const loc   = document.getElementById('f-loc')?.value?.trim();
  const catSel = document.getElementById('f-cat')?.value;
  const cat   = catSel === 'ระบุ' ? (document.getElementById('f-cat-custom')?.value?.trim() || 'ระบุ') : catSel;
  const ts    = document.getElementById('f-ts')?.value;
  const date  = document.getElementById('f-date')?.value;
  if (!title||!cat||!loc||!ts) { toast('กรุณากรอกข้อมูลที่จำเป็น (*)', 'err'); return; }
  const date2 = document.getElementById('f-date2')?.value||'';
  ASSIGN.push({
    id: rid, title, cat, loc, date, date2, ts,
    te: document.getElementById('f-te')?.value||'',
    reporter: document.getElementById('f-rep')?.value||'',
    equip_rem: document.getElementById('f-eq')?.value||'',
    status:'pending', issuer:CU.name, cams:[],
    detail: document.getElementById('f-detail')?.value||'',
  });
  saveAS(); buildNav();
  toast(`ส่งหมาย ${rid} สำเร็จ!`);
  goPage('dash');
}

        <span style="background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:7px;font-family:var(--mono);">${pending.length}</span>

      <div style="flex:1;overflow-y:auto;padding:7px;" id="crew-list">

              <div style="font-size:8px;font-family:var(--mono);color:var(--t3);margin-bottom:1px;">${a.id}</div>
              <div style="font-size:11.5px;font-weight:600;color:${i===0?'var(--text)':'var(--t2)'};margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${a.title}</div>
              <div style="font-size:9px;color:var(--t3);"><i class="fa-regular fa-calendar" style="margin-right:3px;"></i>${a.date} ${a.ts}</div>

function crewSelect(id) {
  document.querySelectorAll('[id^="ci-"]').forEach(el => { el.style.borderColor='var(--border)'; el.style.background='var(--bg)'; });
  const el = document.getElementById('ci-'+id);
  if (el) { el.style.borderColor='var(--acc)'; el.style.background='var(--adim)'; }
  const a = ASSIGN.find(x => x.id===id); if (!a) return;
  document.getElementById('crew-ws').innerHTML = crewFormHTML(a);

}

// ─── Slot count (module-level, reset each time crewInitSlots is called)
let _sc = 0;

function crewInitSlots() {
  _sc = 0;
  const c = document.getElementById('cam-slots');
  if (!c) return;
  c.innerHTML = '';
  crewAddSlot();
}

function crewAddSlot() {
  const c = document.getElementById('cam-slots'); if (!c) return;
  if (_sc >= 6) { toast('สูงสุด 6 คนต่อหมาย', 'warn'); return; }
  const idx = _sc++;

  const EQ_TYPES = [
    {lb:'กล้อง', t:'camera'}, {lb:'LiveU', t:'liveu'}, {lb:'ไมค์', t:'mic'},
    {lb:'ขาตั้ง', t:'tripod'}, {lb:'ไฟ LED', t:'light'}, {lb:'โดรน', t:'drone'},
  ];

  // Build slot element entirely via DOM (no innerHTML with template strings)
  const wrap = document.createElement('div');
  wrap.className = 'cardsm';
  wrap.id = 'cs-' + idx;
  wrap.style.cssText = 'padding:12px;';

  // ── Header row ─────────────────────────────────
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;gap:7px;margin-bottom:9px;';

  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:9px;color:var(--t3);font-family:var(--mono);background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;';
  lbl.textContent = 'ช่างภาพ ' + (idx+1);

  const camSel = document.createElement('select');
  camSel.className = 'inp';
  camSel.id = 'cs-cam-' + idx;
  camSel.style.cssText = 'flex:1;font-size:11.5px;padding:6px 9px;';

  const ph = new Option('-- เลือกจาก '+CAMERAMEN.length+' คน --','');
  ph.disabled = true; ph.selected = true;
  camSel.appendChild(ph);
  const gS = document.createElement('optgroup'); gS.label = 'Senior';
  CAMERAMEN.filter(c=>c.r==='Senior').forEach(c=>{ gS.appendChild(new Option(c.n,c.n)); });
  const gA = document.createElement('optgroup'); gA.label = 'Associate';
  CAMERAMEN.filter(c=>c.r==='Associate').forEach(c=>{ gA.appendChild(new Option(c.n,c.n)); });
  camSel.appendChild(gS); camSel.appendChild(gA);

  hdr.appendChild(lbl); hdr.appendChild(camSel);

  if (idx > 0) {
    const rmBtn = document.createElement('button');
    rmBtn.className = 'bic';
    rmBtn.style.cssText = 'color:var(--red);border-color:rgba(239,68,68,.18);flex-shrink:0;';
    rmBtn.title = 'ลบ';
    rmBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
    rmBtn.onclick = () => wrap.remove();
    hdr.appendChild(rmBtn);
  }

  // ── Drive radio ────────────────────────────────
  const driveRow = document.createElement('div');
  driveRow.style.cssText = 'display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px;';
  [['self','ขับเอง','+150฿','#4ade80'],['none','ไม่ขับ','','']].forEach(([val,txt,badge,bc], ri) => {
    const lbl2 = document.createElement('label');
    lbl2.style.cssText = 'display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);';
    const radio = document.createElement('input');
    radio.type = 'radio'; radio.name = 'dr-' + idx; radio.value = val; radio.style.margin = '0';
    if (ri === 1) radio.checked = true;
    lbl2.appendChild(radio);
    lbl2.appendChild(document.createTextNode(' ' + txt));
    if (badge) {
      const sp = document.createElement('span');
      sp.style.cssText = `font-size:9.5px;color:${bc};font-family:var(--mono);`;
      sp.textContent = badge;
      lbl2.appendChild(sp);
    }
    driveRow.appendChild(lbl2);
  });

  // ── Equipment picker (flexible chip style) ────
  const eqSection = document.createElement('div');
  eqSection.style.cssText = 'border-top:1px solid var(--border);padding-top:9px;margin-top:2px;';

  const eqLbl = document.createElement('div');
  eqLbl.style.cssText = 'font-size:9.5px;color:var(--t3);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;';
  eqLbl.innerHTML = '<span>อุปกรณ์ที่ใช้ <span style="opacity:.6;">(ไม่บังคับ — เลือกหรือพิมพ์เพิ่มได้เสรี)</span></span>';

  // Chip container
  const chipWrap = document.createElement('div');
  chipWrap.id = 'cs-chips-' + idx;
  chipWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;min-height:24px;';

  // Quick-pick buttons from available EQUIP
  const quickRow = document.createElement('div');
  quickRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;';

  // Build quick-pick from all EQ_META types (except vehicle)
  const EQ_TYPES_QPK = Object.entries(EQ_META)
    .filter(([k]) => k !== 'vehicle')
    .map(([k,m]) => ({t:k, lb:m.lb}));

  EQ_TYPES_QPK.forEach(row => {
    const avail = EQUIP.filter(e=>e.t===row.t&&e.s==='available');
    if (!avail.length) return;
    // group button for the type
    const grpBtn = document.createElement('button');
    grpBtn.type = 'button';
    grpBtn.textContent = '+ ' + row.lb;
    grpBtn.style.cssText = 'padding:3px 9px;font-size:10.5px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--sans);transition:all .15s;';
    grpBtn.onmouseover = () => { grpBtn.style.borderColor='var(--acc)'; grpBtn.style.color='var(--acc)'; };
    grpBtn.onmouseout  = () => { grpBtn.style.borderColor='var(--border)'; grpBtn.style.color='var(--t2)'; };
    grpBtn.onclick = () => eqShowPicker(idx, row.t, row.lb, grpBtn);
    quickRow.appendChild(grpBtn);
  });

  // Free-text input
  const freeInput = document.createElement('input');
  freeInput.type = 'text';
  freeInput.className = 'inp';
  freeInput.id = 'cs-eq-free-' + idx;
  freeInput.placeholder = 'พิมพ์รหัส/ชื่ออุปกรณ์ แล้วกด Enter เพื่อเพิ่ม';
  freeInput.style.cssText = 'font-size:11px;padding:5px 9px;';
  freeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = freeInput.value.trim();
      if (val) { addEqChip(idx, val, val); freeInput.value = ''; }
    }
  });

  eqSection.appendChild(eqLbl);
  eqSection.appendChild(chipWrap);
  eqSection.appendChild(quickRow);
  eqSection.appendChild(freeInput);

  wrap.appendChild(hdr);
  wrap.appendChild(driveRow);
  wrap.appendChild(eqSection);
  c.appendChild(wrap);
}

function addEqChip(idx, code, label) {
  const wrap = document.getElementById('cs-chips-' + idx); if (!wrap) return;
  // prevent duplicate
  if (Array.from(wrap.querySelectorAll('.eq-chip')).some(c=>c.dataset.code===code)) return;
  const chip = document.createElement('div');
  chip.className = 'eq-chip';
  chip.dataset.code = code;
  chip.style.cssText = 'display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;background:var(--adim);border:1px solid var(--aglow);font-size:11px;color:var(--acc);';
  chip.innerHTML = `<span>${label}</span><button type="button" onclick="this.closest('.eq-chip').remove()" style="background:none;border:none;color:var(--acc);cursor:pointer;font-size:11px;padding:0;line-height:1;opacity:.7;">&times;</button>`;
  wrap.appendChild(chip);
}

function eqShowPicker(slotIdx, type, typeLbl, anchorBtn) {
  // toggle: close if already open
  const pickerId = 'eq-picker-' + slotIdx + '-' + type;
  const existing = document.getElementById(pickerId);
  if (existing) { existing.remove(); return; }

  const avail = EQUIP.filter(e => e.t === type);
  const picker = document.createElement('div');
  picker.id = pickerId;
  picker.style.cssText = 'position:absolute;z-index:60;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px;min-width:210px;box-shadow:0 8px 24px rgba(0,0,0,.5);margin-top:4px;';

  // Header
  const hd = document.createElement('div');
  hd.style.cssText = 'font-size:9.5px;font-weight:700;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;';
  hd.textContent = typeLbl;
  picker.appendChild(hd);

  if (avail.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:var(--t3);font-size:11px;padding:4px 0 2px;';
    empty.textContent = 'ไม่มีอุปกรณ์ประเภทนี้';
    picker.appendChild(empty);
  } else {
    avail.forEach(e => {
      const row = document.createElement('div');
      const isDisabled = e.s !== 'available';
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:6px;font-size:11.5px;transition:background .12s;' + (isDisabled ? 'opacity:.38;' : 'cursor:pointer;');
      
      const nameSpan = document.createElement('span');
      nameSpan.style.color = isDisabled ? 'var(--t3)' : 'var(--text)';
      nameSpan.textContent = e.n;

      const codeSpan = document.createElement('span');
      codeSpan.style.cssText = 'font-family:var(--mono);font-size:9.5px;color:var(--t3);margin-left:8px;flex-shrink:0;';
      codeSpan.textContent = e.c + (isDisabled ? ' (ไม่ว่าง)' : '');

      row.appendChild(nameSpan);
      row.appendChild(codeSpan);

      if (!isDisabled) {
        row.addEventListener('mouseenter', () => row.style.background = 'var(--bg)');
        row.addEventListener('mouseleave', () => row.style.background = 'transparent');
        row.addEventListener('click', () => {
          addEqChip(slotIdx, e.c, e.c + ' ' + e.n);
          picker.remove();
        });
      }
      picker.appendChild(row);
    });
  }

  // Position relative to anchor's parent
  anchorBtn.parentNode.style.position = 'relative';
  anchorBtn.parentNode.appendChild(picker);

  // Close on outside click
  setTimeout(() => {
    const closer = ev => {
      if (!picker.contains(ev.target) && ev.target !== anchorBtn) {
        picker.remove();
        document.removeEventListener('click', closer);
      }
    };
    document.addEventListener('click', closer);
  }, 10);
}

function crewConfirm() {
  // ── 1. หา assign ID จาก crew-form ──
  const form = document.getElementById('crew-form');
  if (!form) { toast('ไม่พบฟอร์ม — กรุณาเลือกหมายใหม่', 'err'); return; }
  const assignId = form.getAttribute('data-id');
  if (!assignId) { toast('ไม่พบรหัสหมาย', 'err'); return; }

  // ── 2. อ่านทุก slot จาก cam-slots container ──
  const slotsContainer = document.getElementById('cam-slots');
  if (!slotsContainer) { toast('ไม่พบส่วนจัดทีม', 'err'); return; }

  const cams = [];
  // วน loop ทุก slot wrapper ที่มี id ขึ้นต้น cs-
  const slotEls = slotsContainer.querySelectorAll('[id^="cs-"]');
  slotEls.forEach(slot => {
    const idx = slot.id.replace('cs-', '');
    // หา select ช่างภาพใน slot นั้น
    const camSel = slot.querySelector('select[id="cs-cam-' + idx + '"]');
    if (!camSel || !camSel.value) return; // ข้าม slot ที่ยังไม่เลือกช่างภาพ

    // อ่านค่า drive จาก radio ใน slot นั้น
    const driveRadio = slot.querySelector('input[type="radio"][name="dr-' + idx + '"]:checked');
    const drive = driveRadio ? driveRadio.value === 'self' : false;

    // อ่าน chips อุปกรณ์
    const chipContainer = slot.querySelector('[id="cs-chips-' + idx + '"]');
    const equipList = chipContainer
      ? Array.from(chipContainer.querySelectorAll('.eq-chip')).map(ch => ch.dataset.code).filter(Boolean)
      : [];

    cams.push({ name: camSel.value, drive, equipList });
  });

  if (cams.length === 0) {
    toast('กรุณาเลือกช่างภาพอย่างน้อย 1 คน', 'err');
    return;
  }
  // Conflict detection: ช่างภาพคนนี้มีหมายซ้อนทับเวลากันหรือไม่
  const targetA = ASSIGN.find(a=>a.id===assignId);
  if (targetA) {
    const conflicts = [];
    cams.forEach(c => {
      const busy = ASSIGN.filter(a =>
        a.id !== assignId &&
        a.status === 'assigned' &&
        a.date === targetA.date &&
        (a.cams||[]).some(x=>x.name===c.name)
      );
      if (busy.length) conflicts.push(c.name + ' (มีหมาย: ' + busy.map(b=>b.ts+' '+b.title.slice(0,15)).join(', ') + ')');
    });
    if (conflicts.length) {
      const ok = confirm(`พบการซ้อนทับ: ` + conflicts.join(', ') + ` -- ยืนยันจัดทีมต่อ?`);
      if (!ok) return;
    }
  }

  // ── 3. อ่านรถข่าว ──
  const vhcCode = document.getElementById('cr-vhc')?.value || '';
  const vhcObj  = vhcCode ? EQUIP.find(e => e.c === vhcCode) : null;
  const vhcName = vhcObj ? vhcObj.n : vhcCode;

  // ── 4. บันทึกลง ASSIGN ──
  const i = ASSIGN.findIndex(a => a.id === assignId);
  if (i < 0) { toast('ไม่พบหมายข่าวในระบบ', 'err'); return; }
  ASSIGN[i].cams   = cams;
  ASSIGN[i].cam    = cams[0].name;
  ASSIGN[i].drive  = cams.some(c => c.drive);
  ASSIGN[i].status = 'assigned';
  if (vhcName) ASSIGN[i].vhc = vhcName;
  saveAS();

  // ── 5. lock อุปกรณ์และรถ ──
  cams.forEach(c => {
    (c.equipList || []).forEach(code => {
      const ei = EQUIP.findIndex(e => e.c === code);
      if (ei >= 0) EQUIP[ei].s = 'in_use';
    });
  });
  if (vhcCode) {
    const vi = EQUIP.findIndex(e => e.c === vhcCode);
    if (vi >= 0) EQUIP[vi].s = 'in_use';
  }
  saveEQ();

  // ── 6. แจ้งผลและ refresh ──
  const dc = cams.filter(c => c.drive).length;
  const names = cams.map(c => c.name).join(', ');
  toast('จัดทีมสำเร็จ! ' + names + (dc ? ' · ขับ ' + dc + ' คน (+' + dc*150 + '฿/วัน)' : ''));
  buildNav();
  goPage('crew');
}

function rtFilterByPeriod(period, ref) {
  // ref = 'YYYY-MM-DD' or 'YYYY-MM' or 'YYYY'
  let list = [...ASSIGN].filter(a => a.rating !== undefined && a.rated_cam !== undefined);
  if (period === 'day')   list = list.filter(a => a.date === ref);
  else if (period === 'month') list = list.filter(a => a.date.slice(0,7) === ref);
  else if (period === 'year')  list = list.filter(a => a.date.slice(0,4) === ref);
  return list;
}

function rtShowInd(name) {
  if (!name) return;
  const seg = window._indSeg || 'all';
  const ref = document.getElementById('ind-ref-date')?.value || today();
  let myA = ASSIGN.filter(a=>(a.cams||[]).some(c=>c.name===name)||a.cam===name);
  if (seg==='day')   myA = myA.filter(a=>a.date===ref);
  else if (seg==='month') myA = myA.filter(a=>a.date.slice(0,7)===ref.slice(0,7));
  else if (seg==='year')  myA = myA.filter(a=>a.date.slice(0,4)===ref.slice(0,4));
  const rated    = myA.filter(a => a.rating !== undefined && a.rated_cam !== undefined);
  const avg      = rated.length ? (rated.reduce((s,a)=>s+(a.rating||0),0)/rated.length).toFixed(1) : '—';
  const avgPct   = avg !== '—' ? Math.round(parseFloat(avg)/10*100)+'%' : '—';
  const totalWU  = myA.reduce((s,a)=>(s+(a.job_weight||calcJobWeight(a).wu)),0).toFixed(1);
  const driveDays = [...new Set(myA.filter(a=>(a.cams||[]).some(c=>c.name===name&&c.drive)).map(a=>a.date))].length;
  const SCORE_BUCKETS = [{lb:'0-3',clr:'#f87171'},{lb:'4-5',clr:'#fb923c'},{lb:'6-7',clr:'#facc15'},{lb:'8-9',clr:'#86efac'},{lb:'10',clr:'#4ade80'}];
  const dist10 = [
    rated.filter(a=>(a.rating||0)<=3).length,
    rated.filter(a=>(a.rating||0)>=4&&(a.rating||0)<=5).length,

    rated.filter(a=>(a.rating||0)>=8&&(a.rating||0)<=9).length,
    rated.filter(a=>(a.rating||0)===10).length,

  const maxDist  = Math.max(...dist10, 1);

  // Trend
  const trend    = calcTrend(name, myA);
  const tlen     = trend.length;
  const trendDir = tlen>=2?(trend[tlen-1].avg>trend[tlen-2].avg?'up':trend[tlen-1].avg<trend[tlen-2].avg?'down':'flat'):'flat';
  const TDIR_IC2 = {up:'fa-arrow-trend-up',down:'fa-arrow-trend-down',flat:'fa-minus'}[trendDir];
  const TDIR_C   = {up:'#4ade80',down:'#f87171',flat:'var(--t3)'}[trendDir];
  // Badges
  const badges   = calcBadges(name, myA);
  // Performance Score
  const perfData = calcPerfScore(name, myA);
  const perfScore = perfData.score;

  document.getElementById('rt-ind').innerHTML = `
  <!-- Stats row -->
  <div class="g4" style="margin-bottom:14px;">
    ${[
      {l:'หมายทั้งหมด',  v:myA.length,                           c:'var(--text)'},
      {l:'คะแนนเฉลี่ย', v:avg==='—'?'—':avg+'/10 ('+avgPct+')', c:avgColor},
      {l:'WU สะสม',      v:totalWU+' WU',                        c:'var(--acc)'},
      {l:'ขับรถเอง',     v:driveDays+' วัน',                     c:'#60a5fa'},
    ].map(s=>`<div class="stat"><div style="font-size:9.5px;color:var(--t3);margin-bottom:3px;">${s.l}</div><div style="font-size:13px;font-weight:800;color:${s.c};">${s.v}</div></div>`).join('')}
  </div>
  <!-- Trend chart -->
  ${trend.length>=2 ? `<div class="card" style="padding:13px 15px;margin-bottom:13px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--text);">Trend คะแนนรายเดือน</div>
      <div style="font-size:10px;color:${TDIR_C};">
        <i class="fa-solid ${TDIR_IC2}"></i> ${trendDir==='up'?'กำลังพัฒนา':trendDir==='down'?'ต้องติดตาม':'คงที่'}
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:60px;">
      ${trend.map(t=>{
        const h=Math.round(t.avg/10*100);
        const clr=t.avg>=8?'#4ade80':t.avg>=6?'#facc15':t.avg>=4?'#fb923c':'#f87171';
        return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">'
          +'<div style="font-size:9.5px;font-weight:700;color:'+clr+';">'+t.avg+'</div>'
          +'<div style="width:100%;background:'+clr+'33;border-radius:4px 4px 0 0;height:'+h+'%;border:1px solid '+clr+'55;position:relative;">'
          +'<div style="position:absolute;bottom:0;left:0;right:0;height:'+h+'%;background:'+clr+';border-radius:4px 4px 0 0;min-height:3px;"></div>'
          +'</div>'
          +'<div style="font-size:8.5px;color:var(--t3);">'+t.ym.slice(5)+'</div>'
          +'</div>';
      }).join('')}
    </div>
  </div>` : ''}
  <!-- Badges -->
  ${badges.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px;">
    ${badges.map(b=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;background:${b.clr}18;border:1px solid ${b.clr}44;">
      <i class="fa-solid ${b.ic}" style="font-size:10px;color:${b.clr};"></i>
      <div>
        <div style="font-size:10.5px;font-weight:700;color:${b.clr};">${b.lb}</div>
        <div style="font-size:9px;color:var(--t3);">${b.desc}</div>
      </div>
    </div>`).join('')}
  </div>` : ''}
  <!-- Score distribution -->
  ${rated.length ? `<div class="card" style="padding:13px 15px;margin-bottom:13px;">
    <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:10px;">การกระจายคะแนน (จาก 10)</div>
    <div style="display:flex;flex-direction:column;gap:5px;">
    ${SCORE_BUCKETS.map((b,i)=>{
      const cnt=dist10[i]; const pct=Math.round(cnt/maxDist*100);
      return `<div style="display:flex;align-items:center;gap:7px;">
        <div style="font-size:10px;color:${b.clr};font-family:var(--mono);font-weight:700;width:28px;text-align:right;">${b.lb}</div>

  <!-- Detail table with comments -->
  <div class="card" style="overflow:hidden;">
    <table class="tbl">
      <thead><tr><th>วันที่</th><th>หมายข่าว</th><th>ขับรถ</th><th>คะแนน</th><th>ความเห็น / Confidential</th></tr></thead>
      <tbody>
        ${myA.sort((a,b)=>b.date.localeCompare(a.date)).map(a=>{

            <td>${(a.rating !== undefined && a.rated_cam !== undefined) ? (()=>{

              return '<div style="font-size:15px;font-weight:800;color:'+sc_clr+';">'+sc+'<span style="font-size:9px;color:var(--t3);">/10</span></div>'+(chips?'<div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;">'+chips+'</div>':'');
            })():'<span style="color:var(--t3);font-size:11px;">รอประเมิน</span>'}</td>
            <td style="max-width:200px;">
              ${a.r_comment

function submitAppeal() {
  const id  = document.getElementById('appeal-assign')?.value;
  const reason = document.getElementById('appeal-reason')?.value?.trim();
  if (!id)     { toast('กรุณาเลือกหมายที่ต้องการโต้แย้ง','err'); return; }
  if (!reason) { toast('กรุณาระบุเหตุผล','err'); return; }
  // บันทึกใน localStorage
  const key = 'tnn_appeals_v5';
  let appeals = [];
  try { appeals = JSON.parse(localStorage.getItem(key)||'[]'); } catch{}
  appeals.push({
    id: 'APL-'+Date.now(), assignId:id, camName:CU.name,
    reason, status:'pending', date: today(),
  });
  localStorage.setItem(key, JSON.stringify(appeals));
  document.getElementById('appeal-assign').value='';
  document.getElementById('appeal-reason').value='';
  toast('ส่งเรื่องโต้แย้งแล้ว — Admin จะพิจารณาภายใน 3 วันทำการ');
}

function pgDrive() {
  const w = document.getElementById('pg-wrap');
  w.innerHTML = `

function driveRender() {
  const cam   = document.getElementById('drv-c')?.value||'';
  const MODE_LBL3 = {day:'วันที่ '+GD.date, month:'เดือน '+GD.month, year:'ปี '+(parseInt(GD.year)+543), all:'ทั้งหมด', range:GD.rangeFrom&&GD.rangeTo?GD.rangeFrom+' ถึง '+GD.rangeTo:'—'};
  const lbl3 = document.getElementById('drv-gd-lbl');
  if (lbl3) lbl3.textContent = MODE_LBL3[GD.mode]||'ทั้งหมด';

  // collect all drive rows (per-cam per-assignment) — filtered by global GD
  let allRows = [];
  gdFilter([...ASSIGN]).forEach(a => {
    (a.cams||[]).filter(c=>c.drive).forEach(c => {
      if (cam && c.name!==cam) return;
      allRows.push({date:a.date, id:a.id, title:a.title, cam_name:c.name, vhc:a.vhc||''});
    });
  });
  allRows.sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id));

  // คำนวณ 150฿/วัน/คน — หมวดตาม (date, cam_name) คู่เดียวกัน = 150 บาทรวม ไม่ว่ากี่หมาย
  const dayMap = {}; // key = "date_camname"
  allRows.forEach(r => {
    const key = r.date + '__' + r.cam_name;
    if (!dayMap[key]) dayMap[key] = {date:r.date, cam_name:r.cam_name, assignments:[]};
    dayMap[key].assignments.push(r);
  });

  // unique days per cam (each = 150฿)
  const dayEntries = Object.values(dayMap).sort((a,b)=>(b.date+b.cam_name).localeCompare(a.date+a.cam_name));
  const billableDays = dayEntries.length;
  const total = billableDays * 150;
  const camSet = [...new Set(allRows.map(r=>r.cam_name))];

  const ss = document.getElementById('drv-stats');
  if (ss) ss.innerHTML = [
    {l:'หมายที่ขับเอง (ทั้งหมด)',  v:allRows.length,   c:'var(--text)'},
    {l:'วัน × คน (ที่เรียกเก็บได้)', v:billableDays,     c:'#facc15'},
    {l:'ช่างภาพที่เกี่ยวข้อง',       v:camSet.length,    c:'#60a5fa'},
    {l:'ยอดรวม',                      v:total.toLocaleString()+' ฿', c:'#4ade80'},
  ].map(s=>`<div class="stat"><div style="font-size:9.5px;color:var(--t3);margin-bottom:3px;">${s.l}</div><div style="font-size:${s.l.includes('ยอดรวม')?'18':'22'}px;font-weight:800;color:${s.c};">${s.v}</div></div>`).join('');

  // build table: group rows under each billable day
  const tb = document.getElementById('drv-tbl');
  if (!tb) return;

  let tbRows = '';
  dayEntries.forEach(day => {
    const isMulti = day.assignments.length > 1;
    day.assignments.forEach((r, ri) => {
      tbRows += `<tr ${isMulti&&ri===0?'style="border-top:2px solid var(--border);"':''}>
        <td style="font-family:var(--mono);font-size:11.5px;color:var(--text);">${ri===0?r.date:''}</td>
        <td style="font-family:var(--mono);font-size:9px;color:var(--t3);">${r.id}</td>
        <td style="font-size:11.5px;color:var(--text);max-width:200px;">${r.title}</td>
        <td style="font-size:11.5px;color:var(--t2);">${ri===0?r.cam_name:''}</td>
        <td style="font-size:11px;color:var(--t3);">${r.vhc||'—'}</td>
        <td>${ri===0
          ? `<span style="font-family:var(--mono);font-size:12px;font-weight:700;color:#4ade80;">+150 ฿</span>
             ${isMulti?`<div style="font-size:9.5px;color:var(--t3);margin-top:1px;">${day.assignments.length} หมาย รวม 1 วัน</div>`:''}`
          : `<span style="font-size:9.5px;color:var(--t4);">—</span>`}
        </td>
      </tr>`;
    });
  });

  tb.innerHTML = `
  <div style="padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;background:rgba(234,179,8,.04);">
    <i class="fa-solid fa-circle-info" style="font-size:10px;color:#facc15;flex-shrink:0;"></i>
    <span style="font-size:11px;color:#facc15;">ค่าขับรถนับ <strong>150 บาทต่อวัน ต่อคน</strong> — หมายหลายหมายในวันเดียวกัน คนเดียวกัน คิดแค่ 150 บาท</span>
  </div>
  <table class="tbl">
    <thead><tr><th>วันที่</th><th>รหัสหมาย</th><th>หมายข่าว</th><th>ช่างภาพ</th><th>รถ</th><th>ค่าขับ</th></tr></thead>
    <tbody>
      ${tbRows||`<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:28px;">ไม่มีข้อมูล</td></tr>`}
      ${billableDays?`<tr style="background:rgba(34,197,94,.03);">
        <td colspan="5" style="font-size:12px;font-weight:700;color:var(--text);text-align:right;border-top:2px solid var(--border);">ยอดรวม (${billableDays} วัน × คน × 150฿)</td>
        <td style="border-top:2px solid var(--border);"><span style="font-family:var(--mono);font-size:14px;font-weight:700;color:#4ade80;">${total.toLocaleString()} ฿</span></td>
      </tr>`:''}
    </tbody>
  </table>`;
}

    <div style="max-width:820px;margin:0 auto;">
      <div class="g3" style="margin-bottom:18px;">
        ${[{l:'อุปกรณ์ทั้งหมด',v:EQUIP.length,c:'var(--text)'},{l:'ว่างพร้อมใช้',v:EQUIP.filter(e=>e.s==='available').length,c:'#4ade80'},{l:'ไม่ว่าง / ซ่อม',v:EQUIP.filter(e=>e.s!=='available').length,c:'#f87171'}]

                          <option value="available" ${e.s==='available'?'selected':''}>ว่าง</option>

function eqChangeStatus(code, val) {
  const i = EQUIP.findIndex(e=>e.c===code); if (i<0) return;
  EQUIP[i].s = val; saveEQ(); toast('อัปเดตสถานะแล้ว');
}
function openAddEquip() {
  document.getElementById('eq-edit-code').value = '';
  document.getElementById('eq-code').value = '';
  document.getElementById('eq-name').value = '';
  document.getElementById('eq-status').value = 'available';
  document.getElementById('eq-code').disabled = false;
  document.getElementById('m-equip-title').textContent = 'เพิ่มอุปกรณ์';
  openM('m-equip');
  buildEqTypeSelect('camera');  // หลัง modal เปิด
}
function openEditEquip(code) {
  const e = EQUIP.find(x=>x.c===code); if (!e) return;
  document.getElementById('m-equip-title').textContent = 'แก้ไขอุปกรณ์';
  document.getElementById('eq-edit-code').value = code;
  document.getElementById('eq-code').value = e.c;
  document.getElementById('eq-name').value = e.n;
  buildEqTypeSelect(e.t);
  document.getElementById('eq-status').value = e.s;
  document.getElementById('eq-code').disabled = true;
  openM('m-equip');
}
function eqTypeChange() {
  const v = document.getElementById('eq-type')?.value;
  const d = document.getElementById('eq-type-new');
  if (d) d.style.display = v === '__new__' ? 'block' : 'none';
}
function buildEqTypeSelect(selectedVal) {
  const sel = document.getElementById('eq-type'); if (!sel) return;
  sel.innerHTML = '';
  Object.entries(EQ_META).forEach(([k,m]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=m.lb; sel.appendChild(o);
  });
  const newOpt = document.createElement('option'); newOpt.value='__new__'; newOpt.textContent='➕ เพิ่มหมวดหมู่ใหม่...'; sel.appendChild(newOpt);
  if (selectedVal) sel.value = selectedVal;
  document.getElementById('eq-type-new').style.display = 'none';
}
function saveEquip() {
  const editCode = document.getElementById('eq-edit-code').value;
  const code = document.getElementById('eq-code').value.trim();
  const name = document.getElementById('eq-name').value.trim();
  let type = document.getElementById('eq-type').value;
  if (type === '__new__') {
    const key = document.getElementById('eq-type-custom-key')?.value?.trim().toLowerCase().replace(/[^a-z0-9_]/g,'-');
    const lb  = document.getElementById('eq-type-custom-lb')?.value?.trim();
    if (!key || !lb) { toast('กรุณาระบุ key และชื่อหมวดหมู่ใหม่','err'); return; }
    type = key;
    if (!EQ_META[type]) { EQ_META[type] = { lb, ic:'fa-box' }; saveEQMeta(); }
  }
  const status = document.getElementById('eq-status').value;
  if (!code||!name) { toast('กรุณากรอกข้อมูลที่จำเป็น','err'); return; }
  if (editCode) {
    const i = EQUIP.findIndex(e=>e.c===editCode);
    if (i>=0) EQUIP[i] = {...EQUIP[i], n:name, t:type, s:status};
  } else {
    if (EQUIP.find(e=>e.c===code)) { toast('รหัสนี้มีแล้วในระบบ','err'); return; }
    EQUIP.push({c:code, n:name, t:type, s:status, hrs:0});
  }
  saveEQ(); closeM('m-equip'); toast(editCode?'แก้ไขอุปกรณ์แล้ว':'เพิ่มอุปกรณ์แล้ว'); pgEquip();
}
function deleteEquip(code) {
  if (!confirm(`ยืนยันลบ ${code}?`)) return;
  EQUIP = EQUIP.filter(e=>e.c!==code); saveEQ(); toast('ลบอุปกรณ์แล้ว','warn'); pgEquip();
}

  { id:'punctual',  lb:'ตรงต่อเวลา',          desc:'ถึง location ก่อนเริ่มงาน ไม่ทำให้งานล่าช้า',           ic:'fa-clock' },

  { id:'pro',       lb:'ความเป็นมืออาชีพ',     desc:'ทัศนคติ ความกระตือรือร้น รับมือสถานการณ์ที่เปลี่ยน',  ic:'fa-medal' },
];
// คะแนน: good=2, ok=1, bad=0
let _crScores = {};  // { punctual: 2, quality: 1, ... }

// ── Job Weight Calculator ─────────────────────────────────
function calcJobWeight(a) {
  if (!a) return { wu: 1.0, label: 'หมายปกติ', breakdown: [] };
  let wu = 1.0;
  const bd = ['หมายปกติ +1.0'];
  // Multi-day
  if (a.date2 && a.date2 > a.date) {
    const d1 = new Date(a.date+'T00:00:00');
    const d2 = new Date(a.date2+'T00:00:00');
    const days = Math.round((d2-d1)/(1000*60*60*24));
    if (days > 0) { wu += days*0.8; bd.push(`+${days} วัน ×0.8 = +${(days*0.8).toFixed(1)}`); }
  }
  // ขับรถเอง
  if ((a.cams||[]).some(c=>c.drive) || a.drive) { wu += 0.3; bd.push('+ขับรถเอง +0.3'); }
  // ต่างจังหวัด (ถ้า loc ไม่มีคำว่า กรุงเทพ/นนทบุรี/ปทุม/สมุทร/นครปฐม/กรุงเทพมหานคร)
  const bkk = ['กรุงเทพ','นนทบุรี','ปทุมธานี','สมุทร','นครปฐม','บึงกุ่ม','ลาดกระบัง','มีนบุรี'];
  const loc = (a.loc||'').toLowerCase();
  const isUpcountry = loc && !bkk.some(k => loc.includes(k));
  if (isUpcountry) { wu += 0.5; bd.push('+ต่างจังหวัด +0.5'); }
  // ป้ายคำ
  let label = 'หมายปกติ';
  if (wu >= 4)      label = 'งานหนักมาก';
  else if (wu >= 2.5) label = 'งานหนัก';
  else if (wu >= 1.5) label = 'งานปานกลาง';
  return { wu: parseFloat(wu.toFixed(1)), label, breakdown: bd };
}

// ── Performance Score Engine ─────────────────────────────
// 1. คำนวณ WU per day (ประสิทธิภาพต่อวัน)
function calcWUperDay(camName, assignList) {
  const myA = assignList.filter(a =>
    (a.cams||[]).some(c=>c.name===camName) || a.cam===camName
  );
  const uniqueDays = new Set(myA.map(a=>a.date)).size;
  const totalWU = myA.reduce((s,a) => s+(a.job_weight||calcJobWeight(a).wu), 0);
  return { totalWU, uniqueDays, wuPerDay: uniqueDays>0 ? totalWU/uniqueDays : 0 };
}

// 2. คะแนนเฉลี่ย (0-10)
function calcAvgScore(camName, assignList) {
  const rated = assignList.filter(a =>
    ((a.cams||[]).some(c=>c.name===camName)||a.cam===camName) &&
    a.rating !== undefined && a.rated_cam !== undefined
  );
  if (!rated.length) return { avg:0, count:0, rated };
  const avg = rated.reduce((s,a)=>s+(a.rating||0),0)/rated.length;
  return { avg, count:rated.length, rated };
}

// 3. Performance Score = (avg/10) × wuPerDay × 10  (normalized)
function calcPerfScore(camName, assignList) {
  const { avg, count, rated } = calcAvgScore(camName, assignList);
  const { totalWU, uniqueDays, wuPerDay } = calcWUperDay(camName, assignList);
  const totalAssign = assignList.filter(a=>
    (a.cams||[]).some(c=>c.name===camName)||a.cam===camName
  ).length;
  const score = count >= 5 ? parseFloat(((avg/10)*wuPerDay*10).toFixed(2)) : null;
  return { avg, count, totalWU, uniqueDays, wuPerDay, score, totalAssign };
}

// 4. Trend: คะแนนรายเดือน (3 เดือนล่าสุด)
function calcTrend(camName, assignList) {
  const months = {};
  assignList.filter(a =>
    ((a.cams||[]).some(c=>c.name===camName)||a.cam===camName) &&
    a.rating !== undefined && a.rated_cam !== undefined
  ).forEach(a => {
    const ym = a.date.slice(0,7);
    if (!months[ym]) months[ym] = [];
    months[ym].push(a.rating||0);
  });
  return Object.entries(months)
    .sort(([a],[b])=>a.localeCompare(b))
    .slice(-4)
    .map(([ym,scores]) => ({
      ym,
      avg: parseFloat((scores.reduce((s,v)=>s+v,0)/scores.length).toFixed(1)),
      count: scores.length,
    }));
}

// 5. Streak: หมายต่อเนื่องที่ได้ ≥8
function calcStreak(camName, assignList) {
  const rated = assignList.filter(a =>
    ((a.cams||[]).some(c=>c.name===camName)||a.cam===camName) &&
    a.rating !== undefined && a.rated_cam !== undefined
  ).sort((a,b)=>a.date.localeCompare(b.date));
  let cur=0, best=0;
  rated.forEach(a => { if((a.rating||0)>=8){cur++;best=Math.max(best,cur);}else cur=0; });
  return { current:cur, best };
}

// 6. Calibration: บก. แต่ละคนให้คะแนนเฉลี่ยเท่าไหร่
function calcCalibration(assignList) {
  const issuerMap = {};
  assignList.filter(a=>a.rating!==undefined&&a.rated_cam!==undefined&&a.issuer).forEach(a=>{
    if (!issuerMap[a.issuer]) issuerMap[a.issuer] = [];
    issuerMap[a.issuer].push(a.rating||0);
  });
  const results = Object.entries(issuerMap).map(([name,scores])=>({
    name,
    avg: parseFloat((scores.reduce((s,v)=>s+v,0)/scores.length).toFixed(1)),
    count: scores.length,
  })).filter(r=>r.count>=3).sort((a,b)=>b.avg-a.avg);
  const teamAvg = results.length
    ? parseFloat((results.reduce((s,r)=>s+r.avg,0)/results.length).toFixed(1)) : 5;
  return { results, teamAvg };
}

// 7. Badges
function calcBadges(camName, assignList) {
  const badges = [];
  const myA = assignList.filter(a=>(a.cams||[]).some(c=>c.name===camName)||a.cam===camName);
  const rated = myA.filter(a=>a.rating!==undefined&&a.rated_cam!==undefined);
  const { current:streak, best:bestStreak } = calcStreak(camName, assignList);
  const abroad = myA.filter(a=>{
    const bkk=['กรุงเทพ','นนทบุรี','ปทุม','สมุทร','นครปฐม'];
    return (a.loc||'') && !bkk.some(k=>(a.loc||'').includes(k));
  }).length;
  const drove = myA.filter(a=>(a.cams||[]).some(c=>c.name===camName&&c.drive)).length;
  const totalWU = myA.reduce((s,a)=>s+(a.job_weight||calcJobWeight(a).wu),0);
  if (streak>=5) badges.push({ic:'fa-fire',lb:'Hot Streak',desc:'คะแนน ≥8 ติดกัน '+streak+' หมาย',clr:'#fb923c'});
  if (bestStreak>=10) badges.push({ic:'fa-crown',lb:'Consistent Pro',desc:'เคยทำ 10 หมายติดได้ ≥8',clr:'#f5c518'});
  if (abroad>=10) badges.push({ic:'fa-plane',lb:'Field Expert',desc:'หมายต่างจังหวัด '+abroad+' ครั้ง',clr:'#60a5fa'});
  if (drove>=20) badges.push({ic:'fa-car',lb:'Road Warrior',desc:'ขับรถเอง '+drove+' ครั้ง',clr:'#4ade80'});
  if (totalWU>=50) badges.push({ic:'fa-mountain',lb:'Heavy Lifter',desc:'WU สะสม '+totalWU.toFixed(0)+' WU',clr:'#a78bfa'});
  if (myA.length>=50) badges.push({ic:'fa-star',lb:'Veteran',desc:'ผ่านมา '+myA.length+' หมาย',clr:'#facc15'});
  return badges;
}

  const total = CRITERIA.reduce((s,c)=>s+(_crScores[c.id]??-1),0);

  const el = document.getElementById('mr-total');
  if (el) el.textContent = filled===CRITERIA.length ? `${total}/10` : `${filled}/${CRITERIA.length} ข้อ`;
}

function submitRating() {
  // ตรวจว่าให้คะแนนครบทุกข้อ
  const missing = CRITERIA.filter(c=>_crScores[c.id]===undefined);
  if (missing.length > 0) {
    toast('กรุณาให้คะแนนให้ครบทุกหัวข้อ (' + missing.map(c=>c.lb).join(', ') + ')','err');
    return;
  }
  const id  = document.getElementById('mr-id').textContent;
  const sel = document.getElementById('mr-cam-sel');
  const cam = sel ? sel.value : document.getElementById('mr-cam').textContent;
  const cmt = document.getElementById('mr-comment').value.trim();
  const total = CRITERIA.reduce((s,c)=>s+_crScores[c.id],0);
  const a = ASSIGN.find(x=>x.id===id); if (!a) return;
  const jw = calcJobWeight(a);
  const i  = ASSIGN.findIndex(x=>x.id===id);
  if (i>=0) {
    ASSIGN[i].status     = 'rated';
    ASSIGN[i].rating     = total;          // 0-10
    ASSIGN[i].rating_pct = Math.round(total/10*100); // % for display
    ASSIGN[i].scores     = {..._crScores}; // per-criteria
    ASSIGN[i].r_comment  = cmt;
    ASSIGN[i].rated_cam  = cam;
    ASSIGN[i].job_weight = jw.wu;         // WU บันทึกตอนประเมิน
    saveAS();
  }
  closeM('m-rate');
  const pct = Math.round(total/10*100);
  toast(`ประเมิน ${cam} — ${total}/10 คะแนน (${pct}%) · WU ${jw.wu}`);
  const cur = document.getElementById('pg-title')?.textContent;
  if (cur===PTITLE.rating) goPage('rating');
  else dRender();
}

  if (i>=0) { appeals[i].status=status; localStorage.setItem(key,JSON.stringify(appeals)); }
  toast(status==='approved'?'ยอมรับการโต้แย้งแล้ว — กรุณาปรับคะแนนด้วยตนเอง':'ยืนยันคะแนนเดิมแล้ว');
  pgAppeals();
}

function addNewCat() {
  const key = document.getElementById('new-cat-key')?.value?.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  const lb  = document.getElementById('new-cat-lb')?.value?.trim();
  if (!key) { toast('กรุณาระบุ key (ภาษาอังกฤษ)','err'); return; }
  if (!lb)  { toast('กรุณาระบุชื่อแสดงหมวดหมู่','err'); return; }
  if (EQ_META[key]) { toast(`หมวดหมู่ "${key}" มีอยู่แล้ว`,'warn'); return; }
  EQ_META[key] = { lb, ic:'fa-box' };
  saveEQMeta();
  document.getElementById('new-cat-key').value = '';
  document.getElementById('new-cat-lb').value = '';
  renderCatList();

function deleteCat(key) {
  const count = EQUIP.filter(e=>e.t===key).length;
  if (count > 0) { toast(`ไม่สามารถลบได้ มีอุปกรณ์ ${count} รายการในหมวดนี้`,'err'); return; }
  if (!confirm(`ลบหมวดหมู่ "${EQ_META[key]?.lb}" ?`)) return;
  delete EQ_META[key]; saveEQMeta();
  renderCatList();
  toast('ลบหมวดหมู่แล้ว','warn');
}

function downloadRatingCSV() {
  const rated = ASSIGN.filter(a => a.rating !== undefined && a.rated_cam !== undefined);
  if (!rated.length) { toast('ยังไม่มีข้อมูลการประเมิน', 'warn'); return; }

  // สร้าง CSV
  const BOM = '\uFEFF'; // UTF-8 BOM สำหรับ Excel Thai
  const headers = ['รหัสหมาย','วันที่','หมายข่าว','ประเภท','สถานที่','ผู้ออกหมาย','ช่างภาพ','ขับรถเอง','คะแนน (1-5)','ระดับ','ความเห็น'];

  const rows = rated.map(a => {
    const camNames = (a.cams||[]).map(c=>c.name).join(' / ') || a.cam || '—';
    const driveNames = (a.cams||[]).filter(c=>c.drive).map(c=>c.name).join(' / ') || (a.drive?'ใช่':'—');
    const level = ['','ต้องปรับปรุง','พอใช้','ปานกลาง','ดี','ยอดเยี่ยม'][a.rating] || '';
    const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';
    return [a.id, a.date, a.title, a.cat||'', a.loc||'', a.issuer||'', camNames, driveNames, a.rating, level, a.r_comment||''].map(esc).join(',');
  });

  const csv = BOM + headers.map(h=>'"'+h+'"').join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const now  = new Date();
  const fname = 'TNN_rating_' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '.csv';
  link.href = url; link.download = fname; link.click();
  URL.revokeObjectURL(url);
  toast('ดาวน์โหลด ' + fname + ' แล้ว (' + rated.length + ' รายการ)');
}
