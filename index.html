// ── dismissed set: เก็บ id ที่ dismiss แล้ว (session only) ──
const _dismissed = new Set();

function buildNotifications() {
  const now     = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const nowMins  = now.getHours()*60 + now.getMinutes();
  const notes = [];

  // 🔴 ACTION REQUIRED ─────────────────────────────────
  // หมายใกล้เริ่ม (≤ 60 นาที)
  ASSIGN.filter(a => a.status==='assigned' && a.date===todayStr).forEach(a => {
    if (!a.ts) return;
    const [h,m] = a.ts.split(':').map(Number);
    const diff = (h*60+m) - nowMins;
    if (diff > 0 && diff <= 60) {
      const nid = 'soon_'+a.id;
      notes.push({
        nid, group:'action',
        icon:'fa-clock', color:'#f87171',
        title:'หมายใกล้เริ่ม',
        msg: `"${a.title.slice(0,28)}" เริ่มใน ${diff} นาที`,
        sub: `${a.ts} · ${a.loc||''}`,
        action: { lb:'ดูหมาย', fn: `goPage('dash');closeNotif();` },
      });
    }
  });

  // หมายรอจัดทีม (แสดงรายหมาย ไม่ใช่รวม)
  ASSIGN.filter(a => a.status==='pending').forEach(a => {
    const nid = 'pend_'+a.id;
    if (_dismissed.has(nid)) return;
    notes.push({
      nid, group:'action',
      icon:'fa-users', color:'#60a5fa',
      title:'รอจัดทีม',
      msg: a.title.slice(0,35),
      sub: `${a.date} ${a.ts||''} · ${a.loc||''}`,
      action: { lb:'จัดทีม', fn: `goPage('crew');closeNotif();` },
      dismissible: true,
    });
  });

  // หมายรอประเมิน (เฉพาะที่ฉันออก)
  ASSIGN.filter(a => a.status==='done' && a.issuer===CU?.name).forEach(a => {
    const nid = 'rate_'+a.id;
    if (_dismissed.has(nid)) return;
    notes.push({
      nid, group:'action',
      icon:'fa-star', color:'#facc15',
      title:'รอประเมินผล',
      msg: a.title.slice(0,35),
      sub: `${a.date} · ${(a.cams||[]).map(c=>c.name).join(', ')||a.cam||''}`,
      action: { lb:'ประเมิน', fn: `openRating('${a.id}');closeNotif();` },
      dismissible: true,
    });
  });

  // 🟡 INFO ─────────────────────────────────────────────
  // อุปกรณ์ส่งซ่อม
  const maint = EQUIP.filter(e => e.s==='maintenance');
  if (maint.length) {
    const nid = 'maint_all';
    if (!_dismissed.has(nid))
      notes.push({
        nid, group:'info',
        icon:'fa-wrench', color:'#fb923c',
        title:'อุปกรณ์ส่งซ่อม',
        msg: maint.map(e=>e.n).join(', ').slice(0,50),
        sub: `${maint.length} รายการ`,
        action: { lb:'ดูคลัง', fn: `goPage('equip');closeNotif();` },
        dismissible: true,
      });
  }

  return notes;
}

function updateNotifBadge() {
  const notes = buildNotifications();
  const badge = document.getElementById('notif-badge');
  if (!badge) return;
  // นับเฉพาะ action group
  const urgent = notes.filter(n=>n.group==='action').length;
  if (urgent > 0) {
    badge.textContent = urgent > 9 ? '9+' : urgent;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function closeNotif() {
  const p = document.getElementById('notif-panel');
  if (p) p.style.display = 'none';
}

function dismissNotif(nid) {
  _dismissed.add(nid);
  // re-render panel
  const notes = buildNotifications();
  renderNotifPanel(notes);
  updateNotifBadge();
}

function renderNotifPanel(notes) {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;

  if (!notes.length) {
    panel.innerHTML = `
      <div style="padding:22px 16px;text-align:center;color:var(--t3);">
        <i class="fa-solid fa-circle-check" style="font-size:26px;display:block;margin-bottom:8px;opacity:.35;color:var(--green);"></i>
        <div style="font-size:12px;font-weight:600;margin-bottom:3px;color:var(--t2);">ทุกอย่างเรียบร้อย</div>
        <div style="font-size:10.5px;">ไม่มีการแจ้งเตือน</div>
      </div>`;
    return;
  }

  // แบ่งกลุ่ม
  const actions = notes.filter(n=>n.group==='action');
  const infos   = notes.filter(n=>n.group==='info');

  const renderItem = (n) => `
    <div style="display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-bottom:1px solid var(--border);background:transparent;transition:background .12s;"
      onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='transparent'">
      <div style="width:30px;height:30px;border-radius:8px;background:${n.color}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
        <i class="fa-solid ${n.icon}" style="font-size:11px;color:${n.color};"></i>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:9.5px;font-weight:700;color:${n.color};text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">${n.title}</div>
        <div style="font-size:12px;font-weight:600;color:var(--text);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${n.msg}</div>
        ${n.sub ? `<div style="font-size:10.5px;color:var(--t3);margin-top:1px;">${n.sub}</div>` : ''}
        ${n.action ? `<button onclick="${n.action.fn}" style="margin-top:6px;padding:3px 9px;font-size:10.5px;font-weight:600;background:${n.color}18;border:1px solid ${n.color}44;color:${n.color};border-radius:5px;cursor:pointer;font-family:var(--sans);">${n.action.lb} →</button>` : ''}
      </div>
      ${n.dismissible ? `<button onclick="dismissNotif('${n.nid}')" title="ปิดการแจ้งเตือนนี้"
        style="background:none;border:none;color:var(--t4);cursor:pointer;padding:2px 4px;border-radius:4px;font-size:13px;flex-shrink:0;line-height:1;transition:color .13s;"
        onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--t4)'">×</button>` : ''}
    </div>`;

  let html2 = '';
  if (actions.length) {
    html2 += `<div style="padding:8px 13px 5px;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);">ต้องดำเนินการ <span style="color:var(--red);">(${actions.length})</span></div>`;
    html2 += actions.map(renderItem).join('');
  }
  if (infos.length) {
    html2 += `<div style="padding:8px 13px 5px;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);${actions.length?'border-top:1px solid var(--border);':''}">ข้อมูลทั่วไป</div>`;
    html2 += infos.map(renderItem).join('');
  }
  panel.innerHTML = html2;
}

function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  if (panel.style.display !== 'none') { closeNotif(); return; }
  const notes = buildNotifications();
  renderNotifPanel(notes);
  panel.style.display = 'block';
  // ปิดเมื่อคลิกนอก
  setTimeout(() => {
    const closer = e => {
      const btn = document.getElementById('notif-btn');
      if (!panel.contains(e.target) && e.target !== btn && !btn?.contains(e.target)) {
        closeNotif();
        document.removeEventListener('click', closer);
      }
    };
    document.addEventListener('click', closer);
  }, 10);
}
